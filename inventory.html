<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory — PharmaPos</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .filter-bar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .filter-bar .search-wrap { flex:1; min-width:200px; }
    .med-name-cell { font-weight:600; font-size:13.5px; }
    .med-category-cell { font-size:12px; color:var(--text-secondary); margin-top:2px; }
    .stock-cell { display:flex; flex-direction:column; gap:4px; }
    .expiry-warn { color: var(--accent-danger); font-weight:600; }
    .expiry-ok { color: var(--text-secondary); }
    .table-actions { display:flex; gap:8px; }
    .action-btn {
      width:30px; height:30px; border-radius:7px; border:1px solid var(--border);
      background:transparent; cursor:pointer; font-size:13px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.12s;
    }
    .action-btn.edit:hover { border-color:var(--accent2); background:rgba(108,99,255,0.08); }
    .action-btn.del:hover { border-color:var(--accent-danger); background:rgba(255,77,109,0.08); }
    .stats-mini {
      display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px;
    }
    .mini-stat {
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:14px 16px;
      display:flex; align-items:center; gap:12px;
    }
    .mini-stat-icon { font-size:20px; }
    .mini-stat-val { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; }
    .mini-stat-label { font-size:11px; color:var(--text-secondary); margin-top:1px; }
  </style>
</head>
<body>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>document.addEventListener('DOMContentLoaded', renderSidebar);</script>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">Inventory Management</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbarDate"></span>
      <button class="btn-accent" onclick="openModal('addMedModal')">➕ Add Medicine</button>
    </div>
  </header>

  <div class="content">
    <!-- Mini Stats -->
    <div class="stats-mini" id="miniStats"></div>

    <!-- Filter Bar -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-body" style="padding:16px 20px">
        <div class="filter-bar">
          <div class="search-wrap" style="flex:1">
            <span class="search-icon">🔍</span>
            <input type="text" class="form-control" id="invSearch" placeholder="Search by name, category, supplier…" oninput="renderTable()"/>
          </div>
          <select class="form-control" style="width:160px" id="catFilter" onchange="renderTable()">
            <option value="">All Categories</option>
          </select>
          <select class="form-control" style="width:140px" id="stockFilter" onchange="renderTable()">
            <option value="">All Stock</option>
            <option value="low">Low Stock</option>
            <option value="ok">In Stock</option>
            <option value="out">Out of Stock</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="card-body" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="padding-left:20px">Medicine</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Min Stock</th>
                <th>Expiry</th>
                <th>Supplier</th>
                <th>Status</th>
                <th style="padding-right:20px">Actions</th>
              </tr>
            </thead>
            <tbody id="invTableBody"></tbody>
          </table>
        </div>
        <div id="noResults" style="display:none;text-align:center;padding:40px;color:var(--text-muted);font-size:14px">No medicines found</div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addMedModal">
  <div class="modal" style="width:520px">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add New Medicine</div>
      <button class="modal-close" onclick="closeModal('addMedModal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Medicine Name *</label>
          <input type="text" class="form-control" id="fName" placeholder="e.g. Paracetamol 500mg"/>
        </div>
        <div class="form-group">
          <label class="form-label">Category *</label>
          <input type="text" class="form-control" id="fCat" placeholder="e.g. Analgesic" list="catList"/>
          <datalist id="catList"></datalist>
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <select class="form-control" id="fUnit">
            <option>Tablet</option><option>Capsule</option><option>Bottle</option>
            <option>Vial</option><option>Piece</option><option>Sachet</option><option>Cream</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Price (Rs.) *</label>
          <input type="number" class="form-control" id="fPrice" placeholder="0" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Stock Quantity *</label>
          <input type="number" class="form-control" id="fStock" placeholder="0" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Minimum Stock</label>
          <input type="number" class="form-control" id="fMinStock" placeholder="20" min="0"/>
        </div>
        <div class="form-group">
          <label class="form-label">Expiry Date *</label>
          <input type="date" class="form-control" id="fExpiry"/>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Supplier</label>
          <input type="text" class="form-control" id="fSupplier" placeholder="Supplier name"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('addMedModal')">Cancel</button>
      <button class="btn-accent" onclick="saveMed()">💾 Save Medicine</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal" style="width:360px">
    <div class="modal-header"><div class="modal-title">Confirm Delete</div><button class="modal-close" onclick="closeModal('deleteModal')">×</button></div>
    <div class="modal-body"><p style="color:var(--text-secondary);font-size:14px">Are you sure you want to delete <strong id="deleteName"></strong>? This action cannot be undone.</p></div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">🗑 Delete</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let deleteId = null;

document.addEventListener('DOMContentLoaded', () => {
  populateFilters();
  renderMiniStats();
  renderTable();
});

function populateFilters() {
  const meds = DB.get('medicines') || [];
  const cats = [...new Set(meds.map(m => m.category))];
  const sel = document.getElementById('catFilter');
  const dl = document.getElementById('catList');
  cats.forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o);
    const d = document.createElement('option'); d.value = c; dl.appendChild(d);
  });
}

function renderMiniStats() {
  const meds = DB.get('medicines') || [];
  const low = meds.filter(m => m.stock > 0 && m.stock <= m.minStock).length;
  const out = meds.filter(m => m.stock === 0).length;
  const expSoon = meds.filter(m => new Date(m.expiry) <= new Date(Date.now() + 60*24*3600*1000)).length;
  const totalVal = meds.reduce((s, m) => s + m.price * m.stock, 0);
  document.getElementById('miniStats').innerHTML = `
    <div class="mini-stat"><span class="mini-stat-icon">💊</span><div><div class="mini-stat-val">${meds.length}</div><div class="mini-stat-label">Total Medicines</div></div></div>
    <div class="mini-stat"><span class="mini-stat-icon">⚠️</span><div><div class="mini-stat-val" style="color:var(--accent-warn)">${low}</div><div class="mini-stat-label">Low Stock</div></div></div>
    <div class="mini-stat"><span class="mini-stat-icon">❌</span><div><div class="mini-stat-val" style="color:var(--accent-danger)">${out}</div><div class="mini-stat-label">Out of Stock</div></div></div>
    <div class="mini-stat"><span class="mini-stat-icon">💰</span><div><div class="mini-stat-val" style="font-size:14px">${formatCurrency(totalVal)}</div><div class="mini-stat-label">Inventory Value</div></div></div>
  `;
}

function renderTable() {
  const q = document.getElementById('invSearch').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const stockF = document.getElementById('stockFilter').value;
  let meds = DB.get('medicines') || [];

  meds = meds.filter(m => {
    const matchQ = !q || m.name.toLowerCase().includes(q) || m.category.toLowerCase().includes(q) || (m.supplier||'').toLowerCase().includes(q);
    const matchCat = !cat || m.category === cat;
    const matchStock = !stockF || (stockF === 'low' && m.stock > 0 && m.stock <= m.minStock) || (stockF === 'ok' && m.stock > m.minStock) || (stockF === 'out' && m.stock === 0);
    return matchQ && matchCat && matchStock;
  });

  const tbody = document.getElementById('invTableBody');
  const noRes = document.getElementById('noResults');
  if (meds.length === 0) { tbody.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  const now = Date.now();

  tbody.innerHTML = meds.map(m => {
    const expDate = new Date(m.expiry);
    const daysLeft = Math.ceil((expDate - now) / (24*3600*1000));
    const expClass = daysLeft <= 30 ? 'expiry-warn' : 'expiry-ok';
    const expLabel = daysLeft <= 0 ? '⚠ Expired' : daysLeft <= 30 ? `⚠ ${daysLeft}d left` : formatDate(m.expiry);
    const pct = Math.min(100, Math.round((m.stock / Math.max(m.minStock * 2, 1)) * 100));
    const barColor = m.stock === 0 ? '#ff4d6d' : m.stock <= m.minStock ? '#ffbe0b' : '#00d4aa';
    let statusBadge;
    if (m.stock === 0) statusBadge = '<span class="badge badge-danger">Out of Stock</span>';
    else if (m.stock <= m.minStock) statusBadge = '<span class="badge badge-warn">Low Stock</span>';
    else statusBadge = '<span class="badge badge-success">In Stock</span>';

    return `
    <tr>
      <td style="padding-left:20px">
        <div class="med-name-cell">${m.name}</div>
      </td>
      <td><span class="badge badge-info">${m.category}</span></td>
      <td><strong>Rs. ${m.price}</strong><div style="font-size:11px;color:var(--text-muted)">per ${m.unit}</div></td>
      <td>
        <div class="stock-cell">
          <strong>${m.stock}</strong>
          <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
      </td>
      <td style="color:var(--text-secondary)">${m.minStock}</td>
      <td class="${expClass}">${expLabel}</td>
      <td style="color:var(--text-secondary)">${m.supplier || '—'}</td>
      <td>${statusBadge}</td>
      <td style="padding-right:20px">
        <div class="table-actions">
          <button class="action-btn edit" onclick="editMed('${m.id}')" title="Edit">✏️</button>
          <button class="action-btn del" onclick="promptDelete('${m.id}','${m.name.replace(/'/g,"\\'")}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function saveMed() {
  const name = document.getElementById('fName').value.trim();
  const cat = document.getElementById('fCat').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const stock = parseInt(document.getElementById('fStock').value);
  const minStock = parseInt(document.getElementById('fMinStock').value) || 20;
  const expiry = document.getElementById('fExpiry').value;
  const unit = document.getElementById('fUnit').value;
  const supplier = document.getElementById('fSupplier').value.trim();
  const editId = document.getElementById('editId').value;

  if (!name || !cat || isNaN(price) || isNaN(stock) || !expiry) {
    showToast('Please fill all required fields', 'error'); return;
  }

  const meds = DB.get('medicines') || [];
  if (editId) {
    const idx = meds.findIndex(m => m.id === editId);
    if (idx >= 0) meds[idx] = { ...meds[idx], name, category: cat, price, stock, minStock, expiry, unit, supplier };
    showToast('Medicine updated!', 'success');
  } else {
    meds.push({ id: genId('m'), name, category: cat, price, stock, minStock, expiry, unit, supplier });
    showToast('Medicine added!', 'success');
  }
  DB.set('medicines', meds);
  closeModal('addMedModal');
  renderTable();
  renderMiniStats();
  resetForm();
}

function editMed(id) {
  const meds = DB.get('medicines') || [];
  const m = meds.find(x => x.id === id);
  if (!m) return;
  document.getElementById('editId').value = m.id;
  document.getElementById('fName').value = m.name;
  document.getElementById('fCat').value = m.category;
  document.getElementById('fPrice').value = m.price;
  document.getElementById('fStock').value = m.stock;
  document.getElementById('fMinStock').value = m.minStock;
  document.getElementById('fExpiry').value = m.expiry;
  document.getElementById('fUnit').value = m.unit;
  document.getElementById('fSupplier').value = m.supplier || '';
  document.getElementById('modalTitle').textContent = 'Edit Medicine';
  openModal('addMedModal');
}

function promptDelete(id, name) {
  deleteId = id;
  document.getElementById('deleteName').textContent = name;
  openModal('deleteModal');
}

function confirmDelete() {
  let meds = DB.get('medicines') || [];
  meds = meds.filter(m => m.id !== deleteId);
  DB.set('medicines', meds);
  closeModal('deleteModal');
  renderTable();
  renderMiniStats();
  showToast('Medicine deleted', 'success');
}

function resetForm() {
  ['fName','fCat','fPrice','fStock','fMinStock','fExpiry','fSupplier'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('editId').value = '';
  document.getElementById('fUnit').value = 'Tablet';
  document.getElementById('modalTitle').textContent = 'Add New Medicine';
}
</script>
</body>
</html>
