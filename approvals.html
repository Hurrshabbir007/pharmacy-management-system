<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approvals — PharmaPos</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .approval-card {
      background:var(--card-bg);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:20px;
      margin-bottom:14px;
      transition:box-shadow 0.15s;
      position:relative;
      overflow:hidden;
    }
    .approval-card:hover { box-shadow:var(--shadow-md); }
    .approval-card.pending { border-left:3px solid var(--accent-warn); }
    .approval-card.approved { border-left:3px solid var(--accent); }
    .approval-card.rejected { border-left:3px solid var(--accent-danger); opacity:0.8; }
    .approval-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
    .patient-name { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
    .doctor-name { font-size:13px; color:var(--text-secondary); margin-top:3px; }
    .approval-meta { display:flex; gap:20px; margin-bottom:14px; flex-wrap:wrap; }
    .meta-item { font-size:13px; }
    .meta-label { color:var(--text-muted); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
    .meta-val { font-weight:500; margin-top:2px; }
    .note-box {
      background:var(--content-bg);
      border-radius:8px; padding:10px 14px;
      font-size:13px; color:var(--text-secondary);
      margin-bottom:14px;
    }
    .approval-actions { display:flex; gap:10px; justify-content:flex-end; }
    .priority-high { background:rgba(255,77,109,0.12); color:var(--accent-danger); }
    .priority-normal { background:rgba(108,99,255,0.12); color:var(--accent2); }
    .tabs { display:flex; gap:4px; background:var(--content-bg); border-radius:10px; padding:4px; margin-bottom:20px; width:fit-content; }
    .tab-btn {
      padding:8px 20px; border-radius:7px; border:none; background:transparent;
      font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s;
      font-family:'DM Sans',sans-serif; color:var(--text-secondary);
    }
    .tab-btn.active { background:var(--card-bg); color:var(--text-primary); box-shadow:var(--shadow-sm); font-weight:600; }
    .count-pill {
      display:inline-block; background:var(--accent-warn); color:#fff;
      font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; margin-left:6px;
    }
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty-icon { font-size:48px; margin-bottom:12px; }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
  </style>
</head>
<body>
<script src="shared.js"></script>
<script src="sidebar.js"></script>
<script>document.addEventListener('DOMContentLoaded', renderSidebar);</script>

<div class="main">
  <header class="topbar">
    <div class="topbar-title">Prescription Approvals</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbarDate"></span>
      <button class="btn-accent" onclick="openModal('addApprovalModal')">➕ New Request</button>
    </div>
  </header>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row" id="appStats"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('all',this)">All <span class="count-pill" id="tc-all">0</span></button>
      <button class="tab-btn" onclick="switchTab('Pending',this)">Pending <span class="count-pill" id="tc-pending" style="background:var(--accent-warn)">0</span></button>
      <button class="tab-btn" onclick="switchTab('Approved',this)">Approved <span class="count-pill" id="tc-approved" style="background:var(--accent)">0</span></button>
      <button class="tab-btn" onclick="switchTab('Rejected',this)">Rejected <span class="count-pill" id="tc-rejected" style="background:var(--accent-danger)">0</span></button>
    </div>

    <!-- Cards -->
    <div id="approvalCards"></div>
  </div>
</div>

<!-- Add Approval Modal -->
<div class="modal-overlay" id="addApprovalModal">
  <div class="modal" style="width:500px">
    <div class="modal-header">
      <div class="modal-title">New Prescription Request</div>
      <button class="modal-close" onclick="closeModal('addApprovalModal')">×</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Patient Name *</label>
          <input type="text" class="form-control" id="aPatient" placeholder="Full name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Doctor Name *</label>
          <input type="text" class="form-control" id="aDoctor" placeholder="Dr. Name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Medicine *</label>
          <input type="text" class="form-control" id="aMedicine" placeholder="Medicine name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input type="number" class="form-control" id="aQty" placeholder="e.g. 20" min="1"/>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-control" id="aPriority">
            <option value="Normal">Normal</option>
            <option value="High">High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" id="aDate"/>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label class="form-label">Note / Reason</label>
          <input type="text" class="form-control" id="aNote" placeholder="Clinical note (optional)"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" onclick="closeModal('addApprovalModal')">Cancel</button>
      <button class="btn-accent" onclick="saveApproval()">📋 Submit Request</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let currentTab = 'all';

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('aDate').value = today;
  renderStats();
  renderCards();
});

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderStats() {
  const approvals = DB.get('approvals') || [];
  const pending = approvals.filter(a => a.status === 'Pending').length;
  const approved = approvals.filter(a => a.status === 'Approved').length;
  const rejected = approvals.filter(a => a.status === 'Rejected').length;
  const high = approvals.filter(a => a.priority === 'High' && a.status === 'Pending').length;

  document.getElementById('appStats').innerHTML = `
    <div class="stat-card yellow"><div class="stat-icon yellow">⏳</div><div class="stat-value">${pending}</div><div class="stat-label">Pending Approvals</div></div>
    <div class="stat-card green"><div class="stat-icon green">✅</div><div class="stat-value">${approved}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card red"><div class="stat-icon red">❌</div><div class="stat-value">${rejected}</div><div class="stat-label">Rejected</div></div>
  `;

  document.getElementById('tc-all').textContent = approvals.length;
  document.getElementById('tc-pending').textContent = pending;
  document.getElementById('tc-approved').textContent = approved;
  document.getElementById('tc-rejected').textContent = rejected;
}

function renderCards() {
  const approvals = DB.get('approvals') || [];
  const filtered = currentTab === 'all' ? approvals : approvals.filter(a => a.status === currentTab);
  const container = document.getElementById('approvalCards');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div style="font-size:14px;font-weight:500">No ${currentTab === 'all' ? '' : currentTab.toLowerCase()} requests</div><div style="font-size:12px;margin-top:6px">No prescription approval requests found</div></div>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    const order = { Pending: 0, Approved: 1, Rejected: 2 };
    return order[a.status] - order[b.status];
  });

  container.innerHTML = sorted.map(a => `
    <div class="approval-card ${a.status.toLowerCase()}">
      <div class="approval-top">
        <div>
          <div class="patient-name">👤 ${a.patient}</div>
          <div class="doctor-name">🩺 ${a.doctor}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge priority-${a.priority.toLowerCase()}">${a.priority === 'High' ? '🔴' : '🔵'} ${a.priority}</span>
          <span class="badge ${a.status === 'Pending' ? 'badge-warn' : a.status === 'Approved' ? 'badge-success' : 'badge-danger'}">${a.status}</span>
        </div>
      </div>
      <div class="approval-meta">
        <div class="meta-item"><div class="meta-label">Medicine</div><div class="meta-val">💊 ${a.medicine}</div></div>
        <div class="meta-item"><div class="meta-label">Quantity</div><div class="meta-val">${a.qty} units</div></div>
        <div class="meta-item"><div class="meta-label">Request Date</div><div class="meta-val">📅 ${formatDate(a.date)}</div></div>
      </div>
      ${a.note ? `<div class="note-box">📝 ${a.note}</div>` : ''}
      ${a.status === 'Pending' ? `
      <div class="approval-actions">
        <button class="btn-danger" onclick="updateStatus('${a.id}','Rejected')">✕ Reject</button>
        <button class="btn-success" onclick="updateStatus('${a.id}','Approved')">✓ Approve</button>
      </div>` : `
      <div style="text-align:right;font-size:12px;color:var(--text-muted)">
        ${a.status === 'Approved' ? '✅ Approved' : '❌ Rejected'} · No further action needed
      </div>`}
    </div>
  `).join('');
}

function updateStatus(id, status) {
  const approvals = DB.get('approvals') || [];
  const idx = approvals.findIndex(a => a.id === id);
  if (idx >= 0) approvals[idx].status = status;
  DB.set('approvals', approvals);
  renderStats();
  renderCards();
  showToast(`Request ${status.toLowerCase()}!`, status === 'Approved' ? 'success' : 'error');
  // Update sidebar badge
  const badge = document.getElementById('pendingBadge');
  if (badge) {
    const pending = approvals.filter(a => a.status === 'Pending').length;
    badge.textContent = pending > 0 ? pending : '';
  }
}

function saveApproval() {
  const patient = document.getElementById('aPatient').value.trim();
  const doctor = document.getElementById('aDoctor').value.trim();
  const medicine = document.getElementById('aMedicine').value.trim();
  const qty = parseInt(document.getElementById('aQty').value);
  const priority = document.getElementById('aPriority').value;
  const date = document.getElementById('aDate').value;
  const note = document.getElementById('aNote').value.trim();

  if (!patient || !doctor || !medicine || isNaN(qty) || !date) {
    showToast('Please fill all required fields', 'error'); return;
  }

  const approvals = DB.get('approvals') || [];
  approvals.push({ id: genId('a'), patient, doctor, medicine, qty, priority, date, note, status: 'Pending' });
  DB.set('approvals', approvals);
  closeModal('addApprovalModal');
  renderStats();
  renderCards();
  showToast('Request submitted!', 'success');
  // Clear form
  ['aPatient','aDoctor','aMedicine','aQty','aNote'].forEach(id => document.getElementById(id).value = '');
}
</script>
</body>
</html>
